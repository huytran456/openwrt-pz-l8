name: Build OpenWrt

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
        type: boolean
  schedule:
    - cron: 0 8 * * 2

env:
  REPO_URL: https://github.com/huytran456/openwrt-redmi-ax3000.git
  REPO_BRANCH: ipq50xx-mainline-kernel-5.15-openwrt-23.05
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: pz-l8.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        dpkg-query -Wf '${Installed-Size}\t${Package}\n' | sort -n | tail -n 100
        df -h
        echo "Removing large packages"
        sudo apt-get remove -y '^dotnet-.*'
        sudo apt-get remove -y '^llvm-.*'
        sudo apt-get remove -y 'php.*'
        sudo apt-get remove -y '^mongodb-.*'
        sudo apt-get remove -y '^mysql-.*'
        sudo apt-get remove -y azure-cli google-cloud-sdk google-chrome-stable firefox powershell mono-devel libgl1-mesa-dri
        sudo apt-get autoremove -y
        sudo apt-get clean
        df -h
        echo "Removing large directories"
        sudo rm -rf /usr/share/dotnet/
        sudo rm -rf /usr/local/graalvm/
        sudo rm -rf /usr/local/.ghcup/
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/local/lib/node_modules
        df -h
        sudo -E apt-get -qq update
        sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5 \
          libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lld llvm lrzsz mkisofs msmtp \
          nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip python3-ply \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig \
          texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        
    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Fix golang version
      run: |
        cd openwrt
        rm -rf feeds/packages/lang/golang
        git clone https://github.com/kenzok8/golang feeds/packages/lang/golang
        
    - name: Load custom feeds
      run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH
        
    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a
      
    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
    - name: Force sysupgrade build in config
      run: |
        cd openwrt
        # Ensure rootfs formats/images so *-sysupgrade.bin is produced per target
        grep -q '^CONFIG_TARGET_IMAGES=y$' .config || echo 'CONFIG_TARGET_IMAGES=y' >> .config
        grep -q '^CONFIG_TARGET_ROOTFS_SQUASHFS=y$' .config || echo 'CONFIG_TARGET_ROOTFS_SQUASHFS=y' >> .config
        # Optional: include initramfs images if you need them
        grep -q '^CONFIG_TARGET_ROOTFS_INITRAMFS=y$' .config || echo 'CONFIG_TARGET_ROOTFS_INITRAMFS=y' >> .config
        # If your tree supports per-device rootfs toggles, keep them on
        echo 'CONFIG_TARGET_PER_DEVICE_ROOTFS=y' >> .config
        echo 'CONFIG_TARGET_PER_DEVICE_ROOTFS_SQUASHFS=y' >> .config
        echo 'CONFIG_TARGET_PER_DEVICE_ROOTFS_INITRAMFS=y' >> .config
        
    - name: Enable batman-adv (kmod + batctl [+ optional LuCI])
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install kmod-batman-adv || true
        ./scripts/feeds install batctl || true
        ./scripts/feeds install luci-proto-batman-adv || true
        
        grep -q '^CONFIG_PACKAGE_kmod-batman-adv=y$' .config || echo 'CONFIG_PACKAGE_kmod-batman-adv=y' >> .config
        grep -q '^CONFIG_PACKAGE_batctl=y$' .config || echo 'CONFIG_PACKAGE_batctl=y' >> .config
        grep -q '^CONFIG_PACKAGE_luci-proto-batman-adv=y$' .config || echo 'CONFIG_PACKAGE_luci-proto-batman-adv=y' >> .config

    - name: Enable full openssl
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install wpad-openssl libustream-openssl || true

        # Helpers
        ensure_set()   { grep -q "^$1=y$" .config || echo "$1=y" >> .config; }
        ensure_unset() { sed -i "/^$1=/d" .config; grep -q "^# $1 is not set$" .config || echo "# $1 is not set" >> .config; }

        # Use OpenSSL variant
        ensure_set   CONFIG_PACKAGE_wpad-openssl
        ensure_unset CONFIG_PACKAGE_wpad
        ensure_unset CONFIG_PACKAGE_wpad-basic
        ensure_unset CONFIG_PACKAGE_wpad-mini
        ensure_unset CONFIG_PACKAGE_wpad-mbedtls
        ensure_unset CONFIG_PACKAGE_wpad-wolfssl
        ensure_unset CONFIG_PACKAGE_wpad-basic-mbedtls
        ensure_unset CONFIG_PACKAGE_wpad-basic-wolfssl

        # libustream with OpenSSL
        ensure_set   CONFIG_PACKAGE_libustream-openssl
        ensure_unset CONFIG_PACKAGE_libustream-mbedtls
        ensure_unset CONFIG_PACKAGE_libustream-wolfssl

        # Prefer full OpenSSL (optional but recommended)
        ensure_set   CONFIG_PACKAGE_libopenssl || true
        ensure_unset CONFIG_PACKAGE_libopenssl-minimal || true
        ensure_unset CONFIG_PACKAGE_libmbedtls || true
        ensure_unset CONFIG_PACKAGE_libwolfssl || true
        
    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j16
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        
    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=RAX3000Q-$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 3

    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@v0.2.1
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 5
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
