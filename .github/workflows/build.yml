# GitHub Actions workflow for building OpenWrt firmware for CMCC PZ-L8
# Builds both AP and Router modes in parallel, releases together
# Uses openwrt-25.12 branch with PR #21495 merged

name: Build OpenWrt for CMCC PZ-L8

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (leave empty for no release)"
        required: false
        default: ""

env:
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE: cmcc_pz-l8
  CONFIG_FILE: pz-l8.config

jobs:
  build:
    name: Build ${{ matrix.mode }}
    runs-on: ubuntu-22.04
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix:
        mode: [Router]

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          # This action removes: android, dotnet, haskell, tool-cache, large-packages
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Show disk space
        run: df -h /

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3-distutils \
            python3-setuptools python3-dev rsync swig unzip \
            zlib1g-dev file wget curl jq device-tree-compiler \
            ccache libelf-dev libdw-dev libiberty-dev

      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: main
          path: openwrt
          fetch-depth: 0

      - name: Merge PR #21495 + #21496 (Router)
        if: matrix.mode == 'Router'
        working-directory: openwrt
        run: |
          git config user.email "builder@github.com"
          git config user.name "GitHub Actions"

          # PR #21495: PZ-L8 support + ath11k-smallbuffers
          git fetch origin pull/21495/head:pr-21495
          git merge pr-21495 --no-edit

          # PR #21496: PHY-to-PHY 2Gbps support
          git fetch origin pull/21496/head:pr-21496
          git merge pr-21496 --no-edit

          # Revert ipq-wifi/Makefile changes - we handle BDF files manually
          git checkout HEAD -- package/firmware/ipq-wifi/Makefile || true

          echo "=== Merge status ==="
          git status --short

      - name: Download BDF files for PZ-L8 WiFi
        working-directory: openwrt
        run: |
          mkdir -p files/lib/firmware/ath11k/IPQ5018/hw1.0
          mkdir -p files/lib/firmware/ath11k/QCN6122/hw1.0

          # IPQ5000 (2.4GHz SoC built-in WiFi)
          curl -L -o files/lib/firmware/ath11k/IPQ5018/hw1.0/board-2.bin \
            "https://github.com/openwrt/firmware_qca-wireless/raw/f7ad5fee1924efdb5d8b2d1bf95bd3867d22e701/board-cmcc_pz-l8.ipq5018"

          # QCN6102 (5GHz external WiFi module)
          curl -L -o files/lib/firmware/ath11k/QCN6122/hw1.0/board-2.bin \
            "https://github.com/openwrt/firmware_qca-wireless/raw/f7ad5fee1924efdb5d8b2d1bf95bd3867d22e701/board-cmcc_pz-l8.qcn6122"

          echo "=== Downloaded BDF files ==="
          ls -la files/lib/firmware/ath11k/IPQ5018/hw1.0/
          ls -la files/lib/firmware/ath11k/QCN6122/hw1.0/

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          # ccache is mode-specific because .config differs
          key: ccache-${{ env.TARGET }}-${{ matrix.mode }}-v9-${{ hashFiles('openwrt/feeds.conf.default') }}
          restore-keys: |
            ccache-${{ env.TARGET }}-${{ matrix.mode }}-v9-
            ccache-${{ env.TARGET }}-v9-

      - name: Cache toolchain (shared)
        uses: actions/cache@v4
        with:
          path: openwrt/staging_dir
          # toolchain is shared between AP and Router (same target)
          key: toolchain-${{ env.TARGET }}-v9-${{ hashFiles('openwrt/include/version.mk') }}
          restore-keys: toolchain-${{ env.TARGET }}-v9-

      - name: Configure ccache
        run: |
          ccache --set-config=cache_dir=~/.ccache
          ccache --set-config=max_size=10G
          ccache --set-config=compression=true
          ccache -z

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom configuration
        working-directory: openwrt
        run: |
          [ -e ../files ] && mv ../files ./files
          [ -e ../$CONFIG_FILE ] && mv ../$CONFIG_FILE .config
          make defconfig

      - name: Download sources
        working-directory: openwrt
        run: |
          for i in 1 2 3; do
            echo "Download attempt $i/3..."
            if make download -j$(nproc) V=s; then
              break
            fi
            [ $i -eq 3 ] && exit 1
            sleep 30
          done

      - name: Build
        working-directory: openwrt
        run: make -j$(nproc) V=w || make -j1 V=s

      - name: Show ccache stats
        run: ccache -s

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          find openwrt/bin/targets -name "*.bin" -exec cp {} artifacts/ \;
          find openwrt/bin/targets -name "*.img" -exec cp {} artifacts/ \;
          cd artifacts && sha256sum * > sha256sums.txt

          if [ "${{ matrix.mode }}" = "AP" ]; then
            PATCHES="PR #21495"
          else
            PATCHES="PR #21495 + PR #21496 (PHY-to-PHY 2Gbps)"
          fi

          cat > BUILD_INFO.txt << EOF
          Mode: ${{ matrix.mode }}
          Build: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          Target: ${{ env.TARGET }}/${{ env.SUBTARGET }}
          Device: ${{ env.DEVICE }}
          Branch: openwrt-25.12
          Patches: ${PATCHES}
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ matrix.mode }}
          path: artifacts/
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    if: inputs.release_tag != ''

    steps:
      - name: Download AP artifacts
        uses: actions/download-artifact@v4
        with:
          name: openwrt-AP
          path: artifacts/ap/

      - name: Download Router artifacts
        uses: actions/download-artifact@v4
        with:
          name: openwrt-Router
          path: artifacts/router/

      - name: Prepare release files
        run: |
          mkdir -p release

          # Copy and rename Router files
          cp -r artifacts/router/* release/

          # Generate sha256sums
          cd release
          sha256sum * > sha256sums

          # Create release notes
          cat > RELEASE_NOTES.md << 'EOF'
          ## OpenWrt Firmware for CMCC PZ-L8

          **Branch:** openwrt-25.12

          ### Patches
          - AP: PR #21495 (PZ-L8 support + ath11k-smallbuffers)
          - Router: PR #21495 + PR #21496 (PHY-to-PHY 2Gbps)

          ### Files

          | File | Mode | Description |
          |------|------|-------------|
          | `openwrt-pz-l8-sysupgrade-ap.bin` | AP | Sysupgrade image |
          | `openwrt-pz-l8-sysupgrade-router.bin` | Router | Sysupgrade image |

          > **Note:** Factory images are not generated for NAND devices. Use the official OpenWrt factory image to flash the device first.

          ### AP Mode
          - All ports bridged (lan1, lan2, lan3, wan)
          - DHCP client with 192.168.10.1 fallback
          - 802.11s mesh support + usteer
          - No firewall, no DHCP server

          ### Router Mode
          - Full router features
          - WAN: wan port (DHCP or PPPoE)
          - LAN: lan1, lan2, lan3 bridged
          - Firewall, NAT, IPv6 support
          - PHY-to-PHY 2Gbps hardware offload

          ### Common Features
          - WiFi: 2.4GHz (IPQ5000) + 5GHz (QCN6102)
          - Driver: ath11k-smallbuffers (256MB RAM optimized)
          - ZRAM: lzo-rle (default) / zstd (optional)

          ### ZRAM Compression
          - Supported: lzo, lzo-rle, zstd
          - Default: lzo-rle (low CPU usage)
          - Switch: `echo zstd > /sys/block/zram0/comp_algorithm`
          - UCI: `option zram_comp_algo 'zstd'`

          ### Installation
          1. Flash factory.bin via stock firmware web UI
          2. Or use sysupgrade to upgrade from existing OpenWrt
          EOF

          ls -la

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          files: release/*
          body_path: release/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
