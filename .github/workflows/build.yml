name: Build OpenWrt for CMCC PZ-L8 (Router Only)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for no release)'
        required: false
        default: ''

env:
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE: cmcc_pz-l8

jobs:
  build:
    name: Build Router
    runs-on: ubuntu-22.04
    timeout-minutes: 720

    steps:
      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-25.12   # ✅ changed
          path: openwrt
          fetch-depth: 0

      - name: Merge PRs (Router)
        working-directory: openwrt
        run: |
          git config user.email "builder@github.com"
          git config user.name "GitHub Actions"

          git fetch origin pull/21495/head:pr-21495
          git merge pr-21495 --no-edit

          git fetch origin pull/21496/head:pr-21496
          git merge pr-21496 --no-edit

          git checkout HEAD -- package/firmware/ipq-wifi/Makefile || true

      # (giữ nguyên các bước build của bạn...)

      - name: Build
        working-directory: openwrt
        run: make -j$(nproc) V=w || make -j1 V=s

      # ✅ Upload toàn bộ bin folder
      - name: Upload artifacts (FULL BIN)
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-bin
          path: openwrt/bin/
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    if: inputs.release_tag != ''

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: openwrt-bin
          path: bin/

      - name: Prepare release
        run: |
          cd bin
          sha256sum * > sha256sums || true
          ls -R

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ inputs.release_tag }}
          files: bin/**   # ✅ upload ALL files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
